[tool:pytest]
# pytest配置文件

# 测试发现
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 标记
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    performance: marks tests as performance tests  
    e2e: marks tests as end-to-end tests
    unit: marks tests as unit tests

# 输出选项
addopts = 
    -ra
    --strict-markers
    --strict-config
    --disable-warnings
    --tb=short

# 覆盖率配置
[coverage:run]
source = langgraph_search
omit = 
    tests/*
    */test_*.py
    setup.py
    venv/*
    .venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

show_missing = True
precision = 2

[coverage:html]
directory = htmlcov