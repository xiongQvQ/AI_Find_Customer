name: Build Desktop App

on:
  push:
    tags:
      - "v*"           # trigger on version tags: v1.0.0, v1.2.3, etc.
  workflow_dispatch:   # allow manual trigger from GitHub UI
    inputs:
      platform:
        description: "Platform to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - macos
          - windows

# ── Concurrency: cancel in-progress builds on the same ref ──────────────────
concurrency:
  group: build-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # macOS → DMG
  # ────────────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS DMG
    runs-on: macos-14          # Apple Silicon (arm64) runner
    if: false  # temporarily disabled — enable once Windows EXE build is stable

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python 3.12 ──────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 3. Cache pip packages ───────────────────────────────────────────────
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-macos-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-macos-

      # ── 4. Install Python build + runtime dependencies ─────────────────────
      #    build_backend.sh --no-venv only installs cython+pyinstaller,
      #    NOT requirements.txt — so we must install it explicitly here.
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install cython pyinstaller
          pip install -r backend/requirements.txt

      # ── 5. Build Python backend (Cython + PyInstaller) ──────────────────────
      - name: Build Python backend
        run: |
          chmod +x packaging/build_backend.sh
          packaging/build_backend.sh mac --no-venv
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: "1"

      # ── 6. Verify backend bundle ─────────────────────────────────────────────
      - name: Verify backend bundle
        run: |
          ls -lh packaging/dist/AIHunter/AIHunter
          echo "==> Checking for raw .py source files (should be 0):"
          python3 -c "
          import os, glob
          dist = 'packaging/dist/AIHunter/_internal'
          for pkg in ['agents','api','config','graph','tools','observability','license']:
              d = os.path.join(dist, pkg)
              sos  = glob.glob(os.path.join(d, '*.so'))
              pys  = [f for f in glob.glob(os.path.join(d,'*.py')) if '__init__' not in f]
              print(f'  {pkg}/: {len(sos)} .so  {len(pys)} raw .py')
          "

      # ── 7. Node.js (for frontend build) ──────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # ── 8. Build frontend ────────────────────────────────────────────────────
      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      # ── 9. Rust toolchain (for Tauri) ────────────────────────────────────────
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      # ── 10. Cache Rust build artifacts ───────────────────────────────────────
      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packaging/tauri/target
          key: rust-macos-${{ hashFiles('packaging/tauri/src-tauri/Cargo.lock') }}
          restore-keys: rust-macos-

      # ── 11. Install Tauri JS deps (includes pre-built cargo-tauri binary) ─────
      - name: Install Tauri JS dependencies
        run: |
          cd packaging/tauri
          rm -f package-lock.json
          npm install

      # ── 12. Build Tauri DMG ───────────────────────────────────────────────────
      - name: Build Tauri DMG
        run: |
          cd packaging/tauri/src-tauri
          ../node_modules/.bin/tauri build --bundles dmg \
            --config '{"build":{"beforeBuildCommand":""}}'
        env:
          APPLE_SIGNING_IDENTITY: "-"
          TAURI_SIGNING_PRIVATE_KEY: ""

      # ── 14. Locate DMG artifact ───────────────────────────────────────────────
      - name: Locate DMG artifact
        id: dmg
        run: |
          DMG=$(find packaging/tauri/src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          echo "path=$DMG" >> $GITHUB_OUTPUT
          echo "name=$(basename $DMG)" >> $GITHUB_OUTPUT
          echo "Found: $DMG"

      # ── 15. Upload DMG artifact ───────────────────────────────────────────────
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIHunter-macOS-dmg
          path: ${{ steps.dmg.outputs.path }}
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────────
  # Windows → EXE (NSIS installer)
  # ────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    if: |
      github.event_name == 'push' ||
      github.event.inputs.platform == 'all' ||
      github.event.inputs.platform == 'windows'

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python 3.12 ──────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 3. Cache pip packages ───────────────────────────────────────────────
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-windows-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-windows-

      # ── 4. Setup MSVC environment (required by Cython to compile .pyd) ────────
      #    windows-latest ships VS Build Tools but cl.exe needs the dev env loaded.
      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      # ── 5. Install Python build + runtime dependencies ────────────────────────
      #    build_backend.sh --no-venv only installs cython+pyinstaller,
      #    NOT requirements.txt — must install explicitly.
      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install cython pyinstaller
          pip install -r backend/requirements.txt

      # ── 6. Build Python backend (Cython .pyd + PyInstaller) ─────────────────
      - name: Build Python backend (Windows)
        shell: bash
        run: |
          chmod +x packaging/build_backend.sh
          packaging/build_backend.sh win --no-venv

      # ── 7. Verify + smoke-test backend bundle ────────────────────────────────
      - name: Verify backend bundle
        shell: pwsh
        run: |
          $exe = "packaging/dist/AIHunter/AIHunter.exe"
          if (Test-Path $exe) { Write-Host "OK: $exe exists" } else { Write-Error "MISSING: $exe"; exit 1 }
          Set-Content -Path verify_bundle.py -Value "import os, glob`ndist = 'packaging/dist/AIHunter/_internal'`nfor p in ['agents','api','config','graph','tools','observability','license']:`n    d = os.path.join(dist, p)`n    pyds = glob.glob(os.path.join(d, '*.pyd'))`n    pys = [f for f in glob.glob(os.path.join(d, '*.py')) if '__init__' not in f]`n    print(f'  {p}/: {len(pyds)} .pyd  {len(pys)} raw .py')"
          python verify_bundle.py

      - name: Smoke-test backend EXE
        shell: pwsh
        run: |
          $exe = "packaging\dist\AIHunter\AIHunter.exe"
          $logFile = "backend_smoke.log"
          Write-Host "==> Launching backend EXE..."
          $proc = Start-Process -FilePath $exe `
            -WorkingDirectory "packaging\dist\AIHunter" `
            -RedirectStandardOutput $logFile `
            -RedirectStandardError "backend_smoke_err.log" `
            -PassThru -NoNewWindow
          Write-Host "    PID: $($proc.Id)"
          # Wait up to 30s for port 8000
          $ready = $false
          for ($i = 0; $i -lt 30; $i++) {
            Start-Sleep 1
            try {
              $tcp = New-Object System.Net.Sockets.TcpClient("127.0.0.1", 8000)
              $tcp.Close()
              $ready = $true
              break
            } catch {}
          }
          $proc.Kill()
          Write-Host "==> backend stdout:"
          if (Test-Path $logFile) { Get-Content $logFile | Select-Object -Last 60 }
          Write-Host "==> backend stderr:"
          if (Test-Path "backend_smoke_err.log") { Get-Content "backend_smoke_err.log" | Select-Object -Last 60 }
          if (-not $ready) {
            Write-Error "Backend EXE did not listen on port 8000 within 30 seconds"
            exit 1
          }
          Write-Host "==> Backend smoke-test PASSED"

      # ── 8. Node.js (for frontend build) ──────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 9. Build frontend ─────────────────────────────────────────────────────
      # Use npm install (not ci) and delete package-lock.json first so npm
      # resolves Windows-native optional deps (@rollup/rollup-win32-x64-msvc)
      # which are missing from the macOS-generated lockfile.
      - name: Build frontend
        shell: bash
        run: |
          cd frontend
          rm -f package-lock.json
          npm install
          npm run build

      # ── 10. Rust toolchain (for Tauri) ───────────────────────────────────────
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # ── 11. Cache Rust build artifacts ──────────────────────────────────────
      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            packaging\tauri\target
          key: rust-windows-${{ hashFiles('packaging/tauri/Cargo.lock') }}
          restore-keys: rust-windows-

      # ── 13. Install Tauri JS deps (includes pre-built cargo-tauri binary) ─────
      # Delete lockfile so npm resolves Windows-native @tauri-apps/cli binary
      # (macOS-generated lockfile references the darwin binary, causing make errors)
      - name: Install Tauri JS dependencies
        shell: bash
        run: |
          cd packaging/tauri
          rm -f package-lock.json
          npm install

      # ── 14. Build Tauri EXE installer ────────────────────────────────────────
      # Use bash but override PATH so MSVC link.exe wins over Git's /usr/bin/link.
      # VCToolsInstallDir is set by ilammy/msvc-dev-cmd; strip trailing backslash.
      - name: Build Tauri EXE (NSIS installer)
        shell: bash
        run: |
          set -euo pipefail
          # Convert Windows path to Unix-style and prepend to PATH
          MSVC_BIN=$(cygpath -u "${VCToolsInstallDir}bin/HostX64/x64" 2>/dev/null || true)
          echo "MSVC bin (unix): $MSVC_BIN"
          export PATH="$MSVC_BIN:$PATH"
          echo "which link: $(which link 2>/dev/null || echo 'not found')"
          echo "CWD: $(pwd)"
          ls packaging/tauri/src-tauri/
          echo "tauri.cmd exists: $(ls packaging/tauri/node_modules/.bin/tauri.cmd 2>/dev/null && echo yes || echo NO)"
          cd packaging/tauri/src-tauri
          ../node_modules/.bin/tauri.cmd build --bundles nsis

      # ── 16. Locate EXE artifact ───────────────────────────────────────────────
      - name: Locate EXE artifact
        id: exe
        shell: pwsh
        run: |
          $bundleDir = "packaging/tauri/target/release/bundle"
          if (-not (Test-Path $bundleDir)) {
            Write-Error "Bundle dir missing: $bundleDir — Tauri build likely failed above"
            exit 1
          }
          Write-Host "==> Bundle dir contents:"
          Get-ChildItem -Recurse $bundleDir | Select-Object FullName | Format-List
          $EXE = (Get-ChildItem -Recurse -Filter "*-setup.exe" $bundleDir | Select-Object -First 1).FullName
          if (-not $EXE) { Write-Error "No *-setup.exe found under $bundleDir"; exit 1 }
          echo "path=$EXE" >> $env:GITHUB_OUTPUT
          echo "name=$(Split-Path $EXE -Leaf)" >> $env:GITHUB_OUTPUT
          Write-Host "Found: $EXE"

      # ── 17. Upload EXE artifact ───────────────────────────────────────────────
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIHunter-Windows-exe
          path: ${{ steps.exe.outputs.path }}
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────────
  # Release: attach artifacts to GitHub Release when triggered by a tag push
  # Only runs on tag push (not workflow_dispatch). Uses `if: always()` on
  # needs so that a single-platform manual run doesn't block release.
  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      needs.build-windows.result == 'success'
    permissions:
      contents: write

    steps:
      - name: Download macOS DMG
        # Only download if macOS build succeeded
        if: needs.build-macos.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: AIHunter-macOS-dmg
          path: release-assets/

      - name: Download Windows EXE
        # Only download if Windows build succeeded
        if: needs.build-windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: AIHunter-Windows-exe
          path: release-assets/

      - name: List release assets
        run: ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
